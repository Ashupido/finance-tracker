{% extends 'base.html' %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <h2 class="text-2xl font-semibold">My Transactions</h2>
  <a href="{% url 'transaction_add' %}" class="bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700">+ Add Transaction</a>
</div>

<div class="bg-white rounded-xl shadow overflow-x-auto">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Title</th>
        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Amount</th>
        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
      </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
      {% for t in transactions %}
      <tr>
        <td class="px-4 py-3 text-sm text-gray-700">{{ t.date }}</td>
        <td class="px-4 py-3 text-sm text-gray-700">{{ t.title }}</td>
        <td class="px-4 py-3 text-sm text-gray-700">{{ t.category }}</td>
        <td class="px-4 py-3 text-sm text-gray-700">{{ t.type }}</td>
        <td class="px-4 py-3 text-sm font-semibold text-gray-900">${{ t.amount }}</td>
        <td class="px-4 py-3 text-sm text-gray-700 space-x-2">
          <a href="{% url 'transaction_edit' t.pk %}" class="text-blue-600 hover:underline">Edit</a>
          <a href="{% url 'transaction_delete' t.pk %}" class="text-red-600 hover:underline">Delete</a>
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="6" class="px-4 py-6 text-center text-gray-500">No transactions yet.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
