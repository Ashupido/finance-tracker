{% extends 'base.html' %}
{% block content %}
  <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow mt-10 text-center">
    <h2 class="text-2xl font-semibold mb-4">Delete Transaction</h2>
    <p class="text-gray-600 mb-6">Are you sure you want to delete <strong class="text-gray-900">{{ transaction.title }}</strong>?</p>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <button type="submit" class="w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-700">Yes, delete</button>
      <a href="{% url 'transaction_list' %}" class="block text-sm text-gray-600 hover:underline">Cancel</a>
    </form>
  </div>
{% endblock %}
